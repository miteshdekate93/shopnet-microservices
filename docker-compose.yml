version: '3.9'

services:
  gateway:
    build: ./gateway
    ports:
      - "5000:8080"
    depends_on:
      - catalog-service
      - order-service
      - identity-service
    networks:
      - microservices-net

  catalog-service:
    build: ./services/catalog-service
    ports:
      - "5001:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=catalog-db;Database=catalogdb;Username=postgres;Password=postgres123"
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      catalog-db:
        condition: service_healthy
    networks:
      - microservices-net

  order-service:
    build: ./services/order-service
    ports:
      - "5002:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=order-db;Database=orderdb;Username=postgres;Password=postgres123"
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      order-db:
        condition: service_healthy
    networks:
      - microservices-net

  identity-service:
    build: ./services/identity-service
    ports:
      - "5003:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=identity-db;Database=identitydb;Username=postgres;Password=postgres123"
      JwtSettings__Secret: "microservices-jwt-secret-key-32chars!!"
      JwtSettings__ExpiryMinutes: "60"
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      identity-db:
        condition: service_healthy
    networks:
      - microservices-net

  catalog-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: catalogdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - catalog-pgdata:/var/lib/postgresql/data
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d catalogdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - order-pgdata:/var/lib/postgresql/data
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orderdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  identity-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: identitydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - identity-pgdata:/var/lib/postgresql/data
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d identitydb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  catalog-pgdata:
  order-pgdata:
  identity-pgdata:

networks:
  microservices-net:
    driver: bridge
